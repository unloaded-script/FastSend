<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" crossorigin="anonymous">
  if (typeof supabase === 'undefined') {
    window.supabase = supabase.createClient('https://mqngtlppbbudjxtlzdtj.supabase.co', 'sb_publishable_u9Tw4YC3oyGwT5witwz_0w_l6agukd8');
}

  async function joinRoom() {
    const roomId = document.getElementById('roomInput').value;
    
    supabase
      .channel('public:messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_id=eq.${roomId}` }, 
      payload => {
        displayMessage(payload.new);
      })
      .subscribe();
  }

  async function sendMessage() {
    const content = document.getElementById('msgInput').value;
    const roomId = document.getElementById('roomInput').value;

    await supabase.from('messages').insert([
      { content: content, room_id: roomId, sender: 'PC' }
    ]);
  }
</script>
